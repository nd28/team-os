<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<meta name="theme-color" content="#0d1117" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ccircle cx='9' cy='8' r='3' fill='%2378b4ff'/%3E%3Ccircle cx='17' cy='9' r='2.4' fill='%2378b4ff'/%3E%3Cpath d='M3 19c0-3 2.7-5 6-5s6 2 6 5' stroke='%2378b4ff' stroke-width='2' fill='none'/%3E%3C/svg%3E" />
<title>Team OS</title>
<style>
  /* ===== design tokens ===== */
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2230; --border:#30363d;
    --txt:#e6edf3; --mut:#8b949e; --acc:#2f81f7; --ok:#3fb950; --warn:#d29922; --bad:#f85149;
    --pri:#a371f7; --radius:12px; --inbg:#0b0f15; --on-accent:#fff;
    --shadow:0 1px 0 rgba(0,0,0,.2);
    /* glassmorphism tokens */
    --glass-bg:rgba(22,27,34,.55); --glass-bg2:rgba(28,34,48,.50); --glass-border:rgba(255,255,255,.08);
    --glass-blur:blur(14px) saturate(160%); --glass-shadow:0 8px 32px rgba(0,0,0,.37);
    --body-grad:radial-gradient(circle at 15% 10%, rgba(47,129,247,.10), transparent 40%),
                radial-gradient(circle at 85% 90%, rgba(163,113,247,.10), transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(63,185,80,.05), transparent 50%);
  }
  /* light theme — overrides the same tokens */
  :root[data-theme="light"]{
    --bg:#f6f8fa; --panel:#ffffff; --panel2:#eaeef2; --border:#d0d7de;
    --txt:#1f2328; --mut:#656d76; --acc:#0969da; --ok:#1a7f37; --warn:#9a6700; --bad:#cf222e;
    --pri:#8250df; --inbg:#ffffff; --on-accent:#fff; --shadow:0 1px 0 rgba(0,0,0,.06);
    --glass-bg:rgba(255,255,255,.55); --glass-bg2:rgba(248,250,252,.50); --glass-border:rgba(0,0,0,.06);
    --glass-blur:blur(14px) saturate(160%); --glass-shadow:0 8px 32px rgba(0,0,0,.08);
    --body-grad:radial-gradient(circle at 15% 10%, rgba(9,105,218,.08), transparent 40%),
                radial-gradient(circle at 85% 90%, rgba(130,80,223,.08), transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(26,127,55,.04), transparent 50%);
  }
  @supports not (backdrop-filter:blur(2px)){ :root{ --glass-bg:var(--panel); --glass-bg2:var(--panel2) } }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);background-image:var(--body-grad);background-attachment:fixed;color:var(--txt);font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  a{color:var(--acc);text-decoration:none}
  button{font:inherit;cursor:pointer;border:1px solid var(--border);background:var(--panel2);color:var(--txt);border-radius:10px;padding:11px 16px;min-height:44px}
  button.primary{background:var(--acc);border-color:transparent;color:#fff}
  button.danger{background:var(--bad);border-color:transparent;color:#fff}
  button.sm{padding:8px 12px;font-size:14px;min-height:38px}
  input,select,textarea{font:inherit;background:var(--inbg);color:var(--txt);border:1px solid var(--border);border-radius:10px;padding:11px 12px;width:100%;min-height:44px}
  label{color:var(--mut);font-size:14px;display:block;margin:10px 0 4px}
  .wrap{max-width:1100px;margin:0 auto;padding:14px}
  header.top{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--glass-border);position:sticky;top:0;background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);z-index:5}
  header.top .brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:17px;flex:0 0 auto}
  header.top .who{margin-left:auto;color:var(--mut);font-size:14px;display:flex;align-items:center;gap:6px;flex:0 0 auto}
  header.top .user-btn{display:flex;align-items:center;gap:8px;padding:4px 10px 4px 4px;border-radius:24px;background:var(--glass-bg2);border:1px solid var(--glass-border);color:var(--txt);min-height:36px;cursor:pointer;position:relative}
  header.top .user-btn:hover{background:var(--panel2)}
  header.top .user-btn .uname{font-weight:600;font-size:14px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  header.top .user-btn .ustatus{font-size:11px;color:var(--mut);line-height:1}
  header.top .user-btn .ucol{display:flex;flex-direction:column;align-items:flex-start;line-height:1.1;gap:2px}
  .user-menu{position:absolute;top:calc(100% + 6px);right:0;min-width:220px;background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);border-radius:12px;box-shadow:var(--glass-shadow);padding:6px;z-index:50;display:none}
  .user-menu.open{display:flex;flex-direction:column;gap:2px}
  .user-menu .um-head{padding:10px 12px;border-bottom:1px solid var(--glass-border);margin-bottom:4px}
  .user-menu .um-head .un{font-weight:600;color:var(--txt);font-size:14px}
  .user-menu .um-head .ur{font-size:12px;color:var(--mut);margin-top:2px}
  .user-menu button{width:100%;justify-content:flex-start;background:transparent;border-color:transparent;color:var(--txt);min-height:38px;padding:8px 12px;border-radius:8px;display:flex;align-items:center;gap:10px;font-size:14px}
  .user-menu button:hover{background:var(--panel2)}
  .user-menu button.danger{color:var(--bad)}
  .user-menu .um-sep{height:1px;background:var(--glass-border);margin:4px 0}
  .rl-badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--mut);font-variant-numeric:tabular-nums;min-height:28px;padding:4px 8px;border-radius:8px;background:var(--glass-bg2);border:1px solid var(--glass-border);white-space:nowrap}
  .rl-badge.low{color:var(--bad);border-color:var(--bad)}
  .rl-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);display:inline-block;flex-shrink:0}
  .rl-badge.low .rl-dot{background:var(--bad)}
  .avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--pri));display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex:0 0 auto}
  nav.tabs{display:flex;gap:4px;padding:8px 10px;border-bottom:1px solid var(--glass-border);overflow:auto;background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur)}
  nav.tabs button{white-space:nowrap;background:transparent;border-color:transparent;color:var(--mut);flex:1 1 0;justify-content:center;display:flex;align-items:center;gap:6px;min-height:44px}
  nav.tabs button.active{color:var(--txt);box-shadow:inset 0 -3px 0 var(--acc)}
  .card{background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);border-radius:var(--radius);padding:14px;margin:12px 0;box-shadow:var(--glass-shadow)}
  .grid{display:grid;gap:12px}
  .kanban{grid-template-columns:repeat(4,1fr)}
  @media(max-width:760px){
    .kanban{grid-template-columns:1fr}
    /* nav to bottom on mobile, content scrolls above it */
    nav.tabs{position:fixed;bottom:0;left:0;right:0;border-top:1px solid var(--glass-border);border-bottom:none;background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);z-index:10;padding:6px 6px calc(6px + env(safe-area-inset-bottom));order:2}
    body{display:flex;flex-direction:column;min-height:100vh}
    header.top{position:sticky;top:0}
    .wrap{padding:14px 14px 90px;order:1}
    nav.tabs button{flex-direction:column;font-size:12px;gap:2px}
    nav.tabs button .ic{width:22px;height:22px}
    header.top .user-btn .uname, header.top .user-btn .ustatus, header.top .user-btn .ucol, header.top .user-btn > svg{display:none}
    header.top .user-btn{padding:2px;min-height:32px}
    header.top .user-btn .avatar{width:30px;height:30px;font-size:13px}
  }
  .col{background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);border-radius:var(--radius);padding:10px;min-height:80px}
  .col h3{margin:6px 8px 10px;font-size:14px;color:var(--mut);text-transform:uppercase;letter-spacing:.04em;display:flex;justify-content:space-between}
  .task{background:var(--glass-bg2);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);border-radius:12px;padding:12px;margin:8px 0}
  .task .t{font-weight:600;font-size:16px}
  .task .m{font-size:14px;color:var(--mut);margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .badge{font-size:13px;padding:4px 10px;border-radius:20px;background:var(--panel);border:1px solid var(--border)}
  .pill{font-size:13px;padding:4px 11px;border-radius:20px}
  .pill.high{background:rgba(248,81,73,.15);color:var(--bad)} .pill.medium{background:rgba(210,153,34,.15);color:var(--warn)} .pill.low{background:rgba(63,185,80,.15);color:var(--ok)}
  .due.over{color:var(--bad)} .due.soon{color:var(--warn)}
  .meters{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
  .meter .bar{height:10px;border-radius:6px;background:var(--inbg);overflow:hidden;margin-top:6px}
  .meter .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--ok),var(--warn),var(--bad))}
  .status .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle}
  .status.active .dot{background:var(--ok)} .status.remote .dot{background:var(--acc)} .status.away .dot{background:var(--warn)} .status.on-leave .dot{background:var(--bad)}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .row > *{flex:0 0 auto}
  .spacer{flex:1 1 auto}
  .empty{color:var(--mut);font-style:italic;padding:8px;font-size:15px}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:14px;z-index:20}
  .modal .box{background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);border-radius:16px;padding:20px;max-width:480px;width:100%;max-height:86vh;overflow:auto;box-shadow:var(--glass-shadow)}
  .toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);padding:12px 16px;border-radius:12px;z-index:30;max-width:90%;font-size:15px;box-shadow:var(--glass-shadow)}
  @media(min-width:761px){ .toast{bottom:24px} }
  .ic{width:20px;height:20px;display:inline-block;vertical-align:-3px}
  .hide{display:none!important}
  @media(max-width:760px){ .hide-on-mobile{display:none!important} }
  .muted{color:var(--mut)} .small{font-size:14px}
  .leavecard{display:flex;justify-content:space-between;gap:10px;align-items:center}
  details summary{cursor:pointer;color:var(--mut);padding:4px 0}
  .line{border-top:1px solid var(--border);margin:10px 0}
</style>
<script>
/* early theme — runs before paint to avoid flash of wrong theme */
(function(){
  try {
    var saved = localStorage.getItem('tos_theme');
    var theme = saved || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    document.documentElement.setAttribute('data-theme', theme);
    var meta = document.querySelector('meta[name=theme-color]');
    if(meta) meta.setAttribute('content', theme==='light' ? '#f6f8fa' : '#0d1117');
  } catch(e){}
})();
</script>
<script src="nucleo-glass.js"></script>

<body>
<header class="top">
  <div class="brand">
    <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="8" r="3"/><circle cx="17" cy="9" r="2.4"/><path d="M3 19c0-3 2.7-5 6-5s6 2 6 5"/><path d="M14 18c.4-2 2-3.2 4-3.2s3.6 1.2 4 3.2"/></svg>
    Team OS
  </div>
  <div class="who" id="who">
    <span class="rl-badge" id="rlBadge" title="GitHub API rate limit"></span>
    <button class="sm theme-btn" id="themeBtn" title="Toggle light/dark" style="min-height:38px;padding:8px 10px"></button>
  </div>
</header>
<nav class="tabs" id="tabs"></nav>
<div class="wrap" id="view"></div>
<div id="modal"></div>

<script>
"use strict";
/* ========================= Team OS — single-file app =========================
 * Backend: a PUBLIC GitHub Gist (read for all devs, writes gated by PAT).
 * Lead role: uses a GitHub PAT (gist scope) to write directly + approve.
 * Dev role: uses own GitHub PAT (gist scope) to write pending approvals only.
 * Gist id is passed in the URL hash: #gist=<id>  (so the id is "encoded" in URL)
 */
const GITHUB_API = "https://api.github.com";
let GIST_ID = "";
let state = { auth:null, team:null, tasks:null, leaves:null, pending:null, user:null, raw:null, rateLimit:null };
const LS = { token:(u)=>`tos_token_${u}`, pass:(u)=>`tos_pass_${u}`, gist:"tos_gist_id", loc:()=>"tos_lastloc", session:"tos_session", cache:"tos_gist_cache" };

/* ---------- theme ---------- */
/* Glass icon helper: prefer Nucleo Glass set, fall back to inline stroke svg */
function GLASS(name, fallback){
  if(typeof NUCLEO_GLASS!=="undefined" && NUCLEO_GLASS[name]){
    // add .ic class to the opening <svg> tag for sizing
    return NUCLEO_GLASS[name].replace(/<svg /, '<svg class="ic" ');
  }
  return fallback;
}
const IC_SUN = GLASS('cloud-sun', '<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>');
const IC_MOON = GLASS('cloud-moon', '<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/></svg>');
function currentTheme(){ return document.documentElement.getAttribute('data-theme') || 'dark'; }
function setTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('tos_theme', t);
  const meta = document.querySelector('meta[name=theme-color]');
  if(meta) meta.setAttribute('content', t==='light' ? '#f6f8fa' : '#0d1117');
  const btn = document.getElementById('themeBtn');
  if(btn){ btn.innerHTML = t==='light' ? IC_MOON : IC_SUN; }
}

/* ---------- icons (Nucleo Glass set + inline fallbacks) ---------- */
const IC = {
  board:  GLASS('grid', '<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="6" height="16" rx="1"/><rect x="10.5" y="4" width="6" height="11" rx="1"/><rect x="18" y="4" width="3" height="7" rx="1"/></svg>'),
  team:   GLASS('team', '<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="8" r="3"/><circle cx="17" cy="9" r="2.4"/><path d="M3 19c0-3 2.7-5 6-5s6 2 6 5"/><path d="M14 18c.4-2 2-3.2 4-3.2s3.6 1.2 4 3.2"/></svg>'),
  leave:  GLASS('leaves', '<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9h18M3 9l9-6 9 6M5 9v11h14V9"/></svg>'),
  approve:GLASS('clipboard-check', '<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>'),
  pin:    GLASS('gear', '<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 17v5M9 3h6l-1 6 3 3H7l3-3-1-6z"/></svg>'),
  loc:    GLASS('crosshairs', '<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s7-5.5 7-11a7 7 0 10-14 0c0 5.5 7 11 7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>'),
  logout:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>',
  clock:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
};
function el(html){const t=document.createElement('template');t.innerHTML=html.trim();return t.content.firstChild;}
function toast(m){const d=el(`<div class="toast"></div>`);d.textContent=m;document.body.appendChild(d);setTimeout(()=>d.remove(),2600);}
function uid(){return 'x'+Math.random().toString(36).slice(2,8)+Date.now().toString(36).slice(-3);}

/* ---------- crypto ---------- */
async function sha256(s){const b=new TextEncoder().encode(s);const h=await crypto.subtle.digest('SHA-256',b);return [...new Uint8Array(h)].map(x=>x.toString(16).padStart(2,'0')).join('');}

/* ---------- gist I/O ---------- */
function captureRateLimit(h){
  const lim = h.get("x-ratelimit-limit");
  const rem = h.get("x-ratelimit-remaining");
  const res = h.get("x-ratelimit-reset");
  if(lim && rem && res){
    state.rateLimit = { limit:+lim, remaining:+rem, reset:+res };
    renderRateLimit();
  }
}
function renderRateLimit(){
  const el = document.getElementById('rlBadge');
  if(!el || !state.rateLimit) return;
  const rl = state.rateLimit;
  const secs = Math.max(0, rl.reset - Math.floor(Date.now()/1000));
  const mm = Math.floor(secs/60), ss = secs%60;
  const low = rl.remaining <= 5;
  el.innerHTML = `<span class="rl-dot ${low?'low':''}"></span>${rl.remaining}/${rl.limit}${secs>0?` · ${mm}:${ss.toString().padStart(2,'0')}`:''}`;
  el.title = `GitHub API: ${rl.remaining}/${rl.limit} requests left. Resets in ${mm}:${ss.toString().padStart(2,'0')}.`;
  el.classList.toggle('low', low);
}
async function getGist(token){
  token = token || (state.user && currentUserToken()) || "";
  const headers = { "Accept":"application/vnd.github+json" };
  if(token) headers.Authorization = `Bearer ${token}`;
  // unauthenticated reads: use 60s localStorage cache to avoid 60/hr rate limit
  if(!token){
    try {
      const c = JSON.parse(localStorage.getItem(LS.cache));
      if(c && c.t && Date.now()-c.t < 60000){ state.raw = c.raw; state.auth = c.auth; state.team = c.team; state.tasks = c.tasks; state.leaves = c.leaves; state.pending = c.pending; return; }
    } catch(e){}
  }
  const r = await fetch(`${GITHUB_API}/gists/${GIST_ID}?_=${Date.now()}`, { headers });
  if(!r.ok) throw new Error("Gist read failed: "+r.status);
  captureRateLimit(r.headers);
  const j = await r.json();
  state.raw = j;
  const parse = f => { try { return JSON.parse(j.files[f].content); } catch(e){ return null; } };
  state.auth = parse("auth.json"); state.team = parse("team.json");
  state.tasks = parse("tasks.json"); state.leaves = parse("leaves.json");
  state.pending = parse("pending_approvals.json");
  if(!token){
    try { localStorage.setItem(LS.cache, JSON.stringify({ t:Date.now(), raw:state.raw, auth:state.auth, team:state.team, tasks:state.tasks, leaves:state.leaves, pending:state.pending })); } catch(e){}
  }
}
async function patchGist(token, files){
  const body = { files };
  const r = await fetch(`${GITHUB_API}/gists/${GIST_ID}`, {
    method:"PATCH", headers:{Authorization:`Bearer ${token}`,"Accept":"application/vnd.github+json","Content-Type":"application/json"},
    body: JSON.stringify(body)
  });
  if(!r.ok){ let m="Gist write failed: "+r.status; try{const e=await r.json();m+=" "+(e.message||"");}catch(_){} throw new Error(m); }
  captureRateLimit(r.headers);
  localStorage.removeItem(LS.cache); // invalidate cache after write
  return r.json();
}
function writeFile(file, obj){ return patchGist(currentUserToken(), { [file]: { content: JSON.stringify(obj,null,2) } }); }

/* ---------- auth ---------- */
function memberById(id){ return state.team.members.find(m=>m.id===id); }
function devByUsername(u){ return state.auth.developers.find(d=>d.username===u); }
function isLead(){ return state.user && state.user.role==='lead'; }
function currentUserToken(){ return localStorage.getItem(LS.token(state.user.username)) || ""; }
async function loginLead(username, token){
  // verify token works on this gist
  const r = await fetch(`${GITHUB_API}/gists/${GIST_ID}`, {headers:{Authorization:`Bearer ${token}`}});
  if(!r.ok) throw new Error("Token invalid or no gist access");
  localStorage.setItem(LS.token(username), token);
  state.user = { id:username, username, name: state.auth.lead.name||username, role:'lead', rights:state.auth.lead.rights };
  saveSession();
  await getGist(token);
  render();
  checkin();
}
async function loginDev(username, password, token){
  const d = devByUsername(username);
  if(!d) throw new Error("Unknown developer. Ask the lead to add you.");
  // password set?
  if(d.passwordHash){
    const h = await sha256(password||"");
    if(h !== d.passwordHash) throw new Error("Wrong password.");
  } else {
    // first dev login before lead set a password: accept any non-empty, lead must set later
    if(!password) throw new Error("Lead has not set your password yet. Enter any temporary password to continue, then ask lead to set it.");
  }
  if(token) localStorage.setItem(LS.token(username), token);
  state.user = { id:d.id, username:d.username, name:d.name, role:'developer', rights:d.rights };
  saveSession();
  if(token){ await getGist(token); }
  render();
  checkin();

}

/* ---------- geolocation ---------- */
function getLoc(){
  return new Promise(res=>{
    if(!navigator.geolocation) return res(null);
    let done=false; const finish=v=>{ if(!done){done=true; res(v);} };
    navigator.geolocation.getCurrentPosition(
      p => finish({lat:p.coords.latitude.toFixed(3), lng:p.coords.longitude.toFixed(3), t:Date.now()}),
      e => { if(e.code!==1) toast("Location unavailable: "+e.message); finish(null); },
      {timeout:8000, enableHighAccuracy:false, maximumAge:60000}
    );
    setTimeout(()=>finish(null), 9000);
  });
}
async function checkin(){
  const loc = await getLoc();
  if(loc) localStorage.setItem(LS.loc(), JSON.stringify(loc));
  const m = memberById(state.user.id);
  if(!m) return;
  m.location = loc; m.lastSeen = new Date().toISOString();
  if(state.user.role==='developer') m.status = m.status==='on-leave' ? 'on-leave' : 'remote';
  // direct write (presence is real-time, not approval-gated — see ARCHITECTURE.md)
  try { await writeFile("team.json", state.team); } catch(e){ toast(e.message); }
  render();
}

/* ---------- approval flow ---------- */
/* Developers cannot edit board data directly. They propose a change which the lead approves. */
async function proposeChange(req){
  // req: {type, file, summary, apply: <function(state)=>mutated file obj>, payload}
  if(isLead()){
    // lead applies directly
    req.apply(state);
    await writeFile(req.file, state[req.fileKey]);
    toast("Applied directly (lead).");
  } else {
    // developer writes a pending request (needs own PAT)
    if(!currentUserToken()) { openTokenPrompt(); throw new Error("Need your GitHub token to submit changes for approval."); }
    const entry = {
      id: uid(), type:req.type, file:req.file, fileKey:req.fileKey, by:state.user.id, byName:state.user.name,
      createdAt:new Date().toISOString(), summary:req.summary, payload:req.payload
    };
    state.pending.requests.push(entry);
    try {
      await writeFile("pending_approvals.json", state.pending);
      toast("Submitted for lead approval.");
    } catch(e){ state.pending.requests.pop(); toast(e.message); throw e; }
  }
  await getGist(); render();
}
async function approveChange(id){
  const r = state.pending.requests.find(x=>x.id===id); if(!r) return;
  // apply the described change to current state
  applyRequestToState(r);
  state.pending.requests = state.pending.requests.filter(x=>x.id!==id);
  await patchGist(currentUserToken(), {
    [r.file]: { content: JSON.stringify(state[r.fileKey],null,2) },
    "pending_approvals.json": { content: JSON.stringify(state.pending,null,2) }
  });
  toast("Approved & applied.");
  await getGist(); render();
}
async function rejectChange(id, reason){
  const r = state.pending.requests.find(x=>x.id===id); if(!r) return;
  r.status="rejected"; r.rejectReason=reason||""; r.resolvedAt=new Date().toISOString();
  // keep a short history? for minimal: just remove
  state.pending.requests = state.pending.requests.filter(x=>x.id!==id);
  await writeFile("pending_approvals.json", state.pending);
  toast("Rejected.");
  await getGist(); render();
}
/* reconstruct mutation from payload (lead's device applies it) */
function applyRequestToState(r){
  if(r.type==="task_status"){
    const t = state.tasks.tasks.find(t=>t.id===r.payload.taskId);
    if(t) t.status = r.payload.status;
  } else if(r.type==="task_add"){
    state.tasks.tasks.push(r.payload.task);
  } else if(r.type==="leave_request"){
    state.leaves.leaves.push(r.payload.leave);
  } else if(r.type==="profile_update"){
    const m = memberById(r.payload.memberId);
    if(m){ if(r.payload.responsibilities!=null)m.responsibilities=r.payload.responsibilities; if(r.payload.workload!=null)m.workload=r.payload.workload; if(r.payload.status!=null)m.status=r.payload.status; }
  }
}

/* ---------- Board view ---------- */
function workloadFor(id){
  const mine = state.tasks.tasks.filter(t=>t.owner===id && t.status!=='done');
  let n=mine.length; // open tasks
  const w = Math.min(100, n*20);
  return {open:n, pct:w, mine};
}
function dueInfo(d){
  if(!d) return {cls:'',txt:'—'};
  const today=new Date(); today.setHours(0,0,0,0);
  const dd=new Date(d); dd.setHours(0,0,0,0);
  const days=Math.round((dd-today)/86400000);
  if(days<0) return {cls:'over',txt:`overdue ${-days}d`};
  if(days===0) return {cls:'soon',txt:'today'};
  if(days<=2) return {cls:'soon',txt:`in ${days}d`};
  return {cls:'',txt:`${days}d`};
}
function viewBoard(){
  const wrap = el(`<div></div>`);
  // team presence strip
  const strip = el(`<div class="card"><div class="row" style="gap:14px"></div></div>`);
  const row = strip.firstChild;
  state.team.members.forEach(m=>{
    const w = workloadFor(m.id);

    row.appendChild(d);

  wrap.appendChild(strip);

  // kanban
  const grid = el(`<div class="grid kanban"></div>`);
  state.tasks.columns.forEach(col=>{

    });

      add.onclick = ()=>openTask(null, col);
      c.appendChild(add);
    }
    grid.appendChild(c);
  });
  wrap.appendChild(grid);
  // help-offer nudge
  const stuck = state.tasks.tasks.filter(t=>t.status==='in-progress' && dueInfo(t.deadline).cls);
  if(stuck.length){
    const n = el(`<div class="card small">⚠ ${stuck.length} task(s) nearing/over deadline — offer help to the owner.</div>`);
    wrap.appendChild(n);
  }
  return wrap;
}
function openTask(t, col){
  const isNew = !t;
  const task = t || {id:uid(), title:'', owner:state.user.id, status:col||'backlog', priority:'medium', deadline:''};
  const opts = (arr,sel)=> arr.map(o=>`<option ${o===sel?'selected':''}>${o}</option>`).join('');
  const devLocked = !isLead() && isNew; // developer adding: lock owner+status
  const members = state.team.members.map(m=>`<option value="${m.id}" ${m.id===task.owner?'selected':''}>${escapeHtml(m.name)}</option>`).join('');
  modal(`<h3>${isNew?'New task':'Task'}</h3>
    <label>Title</label><input id="tt" value="${escapeHtml(task.title)}" />
    <label>Owner</label><select id="to" ${devLocked?'disabled':''}>${members}</select>
    <div class="row" style="gap:10px"><div style="flex:1"><label>Status</label><select id="ts" ${devLocked?'disabled':''}>${opts(state.tasks.columns,task.status)}</select></div>
    <div style="flex:1"><label>Priority</label><select id="tp">${opts(state.tasks.priorities,task.priority)}</select></div></div>
    <label>Deadline (YYYY-MM-DD)</label><input id="td" type="date" value="${task.deadline||''}" />
    ${devLocked?'<div class="muted small">Owner and status are fixed for developer-added tasks. Lead will review.</div>':''}
    <div class="row" style="margin-top:12px">
      ${isNew?'':`<button class="danger sm" id="tdel">Delete</button>`}
      <div class="spacer"></div>
      <button class="sm" id="tcancel">Cancel</button>
      <button class="primary sm" id="tsave">Save</button>
    </div>`);
  document.getElementById('tcancel').onclick=closeModal;
  document.getElementById('tsave').onclick=async ()=>{
    const payload = { id:task.id, title:val('tt').trim(), owner:devLocked?state.user.id:val('to'), status:devLocked?'backlog':val('ts'), priority:val('tp'), deadline:val('td') };
    if(!payload.title) return toast("Title required");
    if(isNew){
      await proposeChange({type:'task_add', file:'tasks.json', fileKey:'tasks', summary:`Add task "${payload.title}"`, payload:{task:payload}});
    } else {
      const orig = state.tasks.tasks.find(x=>x.id===task.id);
      if(orig.status!==payload.status){
        await proposeChange({type:'task_status', file:'tasks.json', fileKey:'tasks',
          summary:`Move "${payload.title}" → ${payload.status}`, payload:{taskId:task.id, status:payload.status}});
      }
      // other field edits: lead only, applied directly
      if(isLead()){
        Object.assign(orig, payload);
        await writeFile('tasks.json', state.tasks);
        toast("Saved."); await getGist(); render();
      } else if(orig.status===payload.status){
        toast("Only the lead can edit task fields. Status change sent for approval.");
      }
      closeModal();
    }
    closeModal();
  };
  if(!isNew){ document.getElementById('tdel').onclick=async ()=>{
    if(!isLead()) return toast("Only lead can delete tasks.");
    state.tasks.tasks = state.tasks.tasks.filter(x=>x.id!==task.id);
    await writeFile('tasks.json', state.tasks); toast("Deleted."); closeModal(); await getGist(); render();
  }; }
}

  list.forEach(r=>{
    const d=el(`<div class="card" style="margin:8px 0">
      <div class="row"><b>${escapeHtml(r.summary)}</b><div class="spacer"></div><span class="badge">${r.type}</span></div>
      <div class="muted small">by ${escapeHtml(r.byName)} · ${timeAgo(r.createdAt)}</div>
      ${r.type==='task_add' ? renderTaskAddDetail(r.payload) : ''}
      <div class="row" style="margin-top:10px"><button class="primary sm" data-a="ok">Approve</button><button class="danger sm" data-a="no">Reject</button></div>
    </div>`);
    d.querySelector('[data-a=ok]').onclick=()=>approveChange(r.id);
    d.querySelector('[data-a=no]').onclick=()=>{ const reason=prompt("Reject reason?"); rejectChange(r.id, reason); };
    card.appendChild(d);
  });
  wrap.appendChild(card);
  return wrap;
}

/* ---------- Manage view (lead) ---------- */
function viewManage(){
  const wrap = el(`<div></div>`);
  const card = el(`<div class="card"><h3 style="margin-top:0">Manage developers</h3>
    <p class="muted small">Set each developer's app password. They log in with username + password + their own GitHub token (gist scope) to submit changes for your approval.</p></div>`);
  state.auth.developers.forEach(d=>{
    const row=el(`<div class="card" style="margin:8px 0">
      <label>Name</label><input class="nm" value="${escapeHtml(d.name)}" />
      <label>Username (login id)</label><input class="un" value="${escapeHtml(d.username)}" />
      <label>New password</label><input class="pw" type="password" placeholder="set / reset password" />
      <button class="primary sm" style="margin-top:10px">Save</button>
    </div>`);
    row.querySelector('button').onclick=async ()=>{
      const newName=row.querySelector('.nm').value.trim();
      const newUn=row.querySelector('.un').value.trim();
      const p=row.querySelector('.pw').value;
      if(!newName||!newUn) return toast("Name and username required");
      d.name=newName; d.username=newUn;
      if(p) d.passwordHash = await sha256(p);
      const m = state.team.members.find(m=>m.id===d.id); if(m){ m.name=newName; }
      // single PATCH with both files to avoid 409 race
      await patchGist(currentUserToken(), {
        "auth.json": { content: JSON.stringify(state.auth,null,2) },
        "team.json": { content: JSON.stringify(state.team,null,2) }
      });
      toast("Saved "+newName);
      await getGist(); render();
    };
    card.appendChild(row);
  });
  wrap.appendChild(card);
  const info = el(`<div class="card small"><b>Share with team (pin on WhatsApp):</b><br>https://nd28.github.io/team-os/#gist=${GIST_ID}<br><span class="muted">Gist id is encoded in the URL hash. Anyone with the link can read the board; only you approve changes.</span></div>`);
  wrap.appendChild(info);
  return wrap;
}

/* ---------- modal ---------- */
function modal(html){ const m=document.getElementById('modal'); m.innerHTML=`<div class="modal"><div class="box">${html}</div></div>`; m.querySelector('.modal').onclick=e=>{if(e.target.classList.contains('modal'))closeModal();}; }
function closeModal(){ document.getElementById('modal').innerHTML=""; }
function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ---------- boot ---------- */
async function boot(){
  GIST_ID = (location.hash.match(/gist=([a-f0-9]+)/)||[])[1] || localStorage.getItem(LS.gist) || "";
  if(!GIST_ID){
    document.getElementById('view').innerHTML = `<div class="card" style="max-width:480px;margin:30px auto">
      <h2 style="margin-top:0">Team OS</h2><p class="muted">Open the link the lead pinned on WhatsApp — it contains the gist id in the URL hash (<code>#gist=…</code>).</p>
      <label>Or paste gist id</label><input id="gid" placeholder="8613…d11a08" />
      <button class="primary" id="gset" style="margin-top:10px">Continue</button></div>`;
    document.getElementById('gset').onclick=async ()=>{ GIST_ID=val('gid').trim(); location.hash=`gist=${GIST_ID}`; localStorage.setItem(LS.gist,GIST_ID); await init(); };
    return;
  }
  localStorage.setItem(LS.gist,GIST_ID);
  await init();
}
async function init(){
  // restore session first so getGist uses token (authenticated = 5000/hr, not 60/hr)
  const saved = restoreSession();
  if(saved) state.user = saved;
  try { await getGist(); } catch(e){ document.getElementById('view').innerHTML=`<div class="card">Failed to load gist: ${e.message}</div>`; return; }
  if(saved){
    // refresh name/role from latest gist data in case lead changed it
    if(saved.role==='lead'){ saved.name = state.auth.lead.name||saved.username; saved.rights = state.auth.lead.rights; }
    else { const d = devByUsername(saved.username); if(d){ saved.name = d.name; saved.rights = d.rights; } else { localStorage.removeItem(LS.session); state.user=null; } }
    saveSession();
    render();
    checkin();
  } else {
    render();
  }
  // refresh every 60s so everyone sees latest (uses token when logged in)
  setInterval(async ()=>{ try{ await getGist(); if(state.user) render(); }catch(_){} }, 60000);
  // countdown rate-limit badge every second
  setInterval(renderRateLimit, 1000);
  // close user menu on outside click / Escape
  document.addEventListener('click', (e) => {
    const m = document.getElementById('userMenu');
    const b = document.getElementById('userBtn');
    if(m && m.classList.contains('open') && !m.contains(e.target) && e.target !== b && !b?.contains(e.target)) closeUserMenu();
  });
  document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeUserMenu(); });
}
boot();
</script>
