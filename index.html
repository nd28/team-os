<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <meta name="theme-color" content="#0d1117" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ccircle cx='9' cy='8' r='3' fill='%2378b4ff'/%3E%3Ccircle cx='17' cy='9' r='2.4' fill='%2378b4ff'/%3E%3Cpath d='M3 19c0-3 2.7-5 6-5s6 2 6 5' stroke='%2378b4ff' stroke-width='2' fill='none'/%3E%3C/svg%3E" />
  <title>Team OS</title>
  <script>
    /* early theme — runs before paint to avoid flash of wrong theme */
    (function(){
      try {
        var saved = localStorage.getItem('tos_theme');
        var theme = saved || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        document.documentElement.setAttribute('data-theme', theme);
        var meta = document.querySelector('meta[name=theme-color]');
        if(meta) meta.setAttribute('content', theme==='light' ? '#f6f8fa' : '#0d1117');
      } catch(e){}
    })();
  </script>
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <header class="top">
    <div class="brand">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="8" r="3"/><circle cx="17" cy="9" r="2.4"/><path d="M3 19c0-3 2.7-5 6-5s6 2 6 5"/><path d="M14 18c.4-2 2-3.2 4-3.2s3.6 1.2 4 3.2"/></svg>
      Team OS
    </div>
    <div class="who" id="who">
      <span class="rl-badge" id="rlBadge" title="GitHub API rate limit"></span>
      <button class="sm theme-btn" id="themeBtn" title="Toggle light/dark" style="min-height:38px;padding:8px 10px"></button>
    </div>
  </header>
  <nav class="tabs" id="tabs"></nav>
  <div class="wrap" id="view"></div>
  <div id="modal"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
